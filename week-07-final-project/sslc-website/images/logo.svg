<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- SSLC Logo: Two people icons with a speech bubble, representing staff-student dialogue -->
  <circle cx="24" cy="24" r="23" fill="#1a3a5c" stroke="#e8913a" stroke-width="2"/>
  <!-- Person 1 (staff) -->
  <circle cx="16" cy="18" r="4" fill="#f7f5f2"/>
  <path d="M10 30 Q10 24 16 24 Q22 24 22 30" fill="#f7f5f2"/>
  <!-- Person 2 (student) -->
  <circle cx="32" cy="18" r="4" fill="#e8913a"/>
  <path d="M26 30 Q26 24 32 24 Q38 24 38 30" fill="#e8913a"/>
  <!-- Speech bubble connecting them -->
  <path d="M18 12 Q24 6 30 12" stroke="#f7f5f2" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Text -->
  <text x="24" y="40" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#f7f5f2">SSLC</text>
</svg>
