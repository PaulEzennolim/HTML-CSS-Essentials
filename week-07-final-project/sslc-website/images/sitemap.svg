<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">
  <!-- Site Map Diagram for SSLC Website -->
  <rect width="700" height="400" rx="6" fill="#f7f5f2"/>
  
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a3a5c">SSLC Website - Site Map</text>
  
  <!-- Home (root) -->
  <rect x="290" y="50" width="120" height="36" rx="6" fill="#1a3a5c"/>
  <text x="350" y="73" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#f7f5f2">Home</text>
  
  <!-- Main Nav Level (connected to Home) -->
  <!-- Lines from Home down -->
  <line x1="350" y1="86" x2="350" y2="110" stroke="#1a3a5c" stroke-width="2"/>
  <line x1="100" y1="110" x2="600" y2="110" stroke="#1a3a5c" stroke-width="2"/>
  
  <!-- Vertical lines down to each main page -->
  <line x1="100" y1="110" x2="100" y2="130" stroke="#1a3a5c" stroke-width="2"/>
  <line x1="225" y1="110" x2="225" y2="130" stroke="#1a3a5c" stroke-width="2"/>
  <line x1="350" y1="110" x2="350" y2="130" stroke="#1a3a5c" stroke-width="2"/>
  <line x1="475" y1="110" x2="475" y2="130" stroke="#1a3a5c" stroke-width="2"/>
  <line x1="600" y1="110" x2="600" y2="130" stroke="#1a3a5c" stroke-width="2"/>
  
  <!-- Main Nav Pages -->
  <rect x="35" y="130" width="130" height="36" rx="6" fill="#2a5a8c"/>
  <text x="100" y="153" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f7f5f2">Our Role</text>
  
  <rect x="160" y="130" width="130" height="36" rx="6" fill="#2a5a8c"/>
  <text x="225" y="153" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f7f5f2">Members</text>
  
  <rect x="285" y="130" width="130" height="36" rx="6" fill="#2a5a8c"/>
  <text x="350" y="153" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f7f5f2">Meetings &amp; Papers</text>
  
  <rect x="410" y="130" width="130" height="36" rx="6" fill="#2a5a8c"/>
  <text x="475" y="153" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f7f5f2">Contact</text>
  
  <!-- Label: Main Navigation -->
  <text x="350" y="195" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5a5a5a" font-style="italic">&#9650; Main Navigation (Header)</text>
  
  <line x1="30" y1="210" x2="670" y2="210" stroke="#d4d0ca" stroke-width="1" stroke-dasharray="4,4"/>
  
  <text x="350" y="230" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5a5a5a" font-style="italic">&#9660; Footer Navigation</text>
  
  <!-- Footer Nav Pages -->
  <line x1="350" y1="240" x2="350" y2="260" stroke="#e8913a" stroke-width="2"/>
  <line x1="100" y1="260" x2="600" y2="260" stroke="#e8913a" stroke-width="2"/>
  
  <line x1="100" y1="260" x2="100" y2="280" stroke="#e8913a" stroke-width="2"/>
  <line x1="267" y1="260" x2="267" y2="280" stroke="#e8913a" stroke-width="2"/>
  <line x1="433" y1="260" x2="433" y2="280" stroke="#e8913a" stroke-width="2"/>
  <line x1="600" y1="260" x2="600" y2="280" stroke="#e8913a" stroke-width="2"/>
  
  <rect x="35" y="280" width="130" height="36" rx="6" fill="#e8913a"/>
  <text x="100" y="303" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f7f5f2">Accessibility</text>
  
  <rect x="202" y="280" width="130" height="36" rx="6" fill="#e8913a"/>
  <text x="267" y="303" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f7f5f2">Legal &amp; Security</text>
  
  <rect x="368" y="280" width="130" height="36" rx="6" fill="#e8913a"/>
  <text x="433" y="303" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f7f5f2">Design</text>
  
  <rect x="535" y="280" width="130" height="36" rx="6" fill="#e8913a"/>
  <text x="600" y="303" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f7f5f2">Testing</text>
  
  <!-- Legend -->
  <rect x="220" y="345" width="16" height="16" rx="3" fill="#1a3a5c"/>
  <text x="242" y="358" font-family="sans-serif" font-size="10" fill="#5a5a5a">Primary pages (header nav)</text>
  <rect x="400" y="345" width="16" height="16" rx="3" fill="#e8913a"/>
  <text x="422" y="358" font-family="sans-serif" font-size="10" fill="#5a5a5a">Secondary pages (footer nav)</text>
  
  <!-- Note about flat structure -->
  <text x="350" y="390" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5a5a5a">Flat hierarchy: all pages accessible within one click from any page</text>
</svg>
