<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <!-- Quiz image: Student voice / megaphone -->
  <rect width="400" height="250" rx="6" fill="#edeae5"/>
  <!-- Person holding megaphone -->
  <circle cx="150" cy="90" r="22" fill="#1a3a5c"/>
  <rect x="138" y="115" width="24" height="40" rx="4" fill="#1a3a5c"/>
  <!-- Megaphone -->
  <polygon points="175,95 280,60 280,130 175,115" fill="#e8913a"/>
  <rect x="165" y="92" width="15" height="28" rx="3" fill="#c77a2e"/>
  <!-- Sound waves -->
  <path d="M290 95 Q310 75 290 55" stroke="#e8913a" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M300 95 Q325 70 300 45" stroke="#e8913a" stroke-width="3" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M310 95 Q340 65 310 35" stroke="#e8913a" stroke-width="3" fill="none" opacity="0.2" stroke-linecap="round"/>
  <!-- Words coming out -->
  <text x="300" y="130" font-family="sans-serif" font-size="11" fill="#1a3a5c" opacity="0.7">Change!</text>
  <text x="290" y="150" font-family="sans-serif" font-size="9" fill="#3a8c5c" opacity="0.6">Support!</text>
  <text x="310" y="165" font-family="sans-serif" font-size="10" fill="#8c3a5c" opacity="0.5">Action!</text>
  <text x="200" y="225" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5a5a5a">Making your voice heard</text>
</svg>
